<!doctype html>
<html>
  <head>
    <title>Simple TCP Chat Client</title>
  </head>
  <body>
    <h2>Simple Python TCP Chat</h2>

    <div id="user-info" style="display: none">
      <p>
        User: <span id="current-user"></span> (<span id="user-uuid"></span>)
      </p>
    </div>

    <div id="login-section">
      <label>Username:</label>
      <input type="text" id="username" placeholder="Enter username" />
      <label>Server IP:</label>
      <input
        type="text"
        id="server-ip"
        placeholder="127.0.0.1"
        value="127.0.0.1"
      />
      <button onclick="connectToServer()">Connect</button>
      <p id="login-status"></p>
    </div>

    <div id="group-section" style="display: none">
      <h3>Group Chats</h3>
      <select id="group-select">
        <option value="">Select a chat</option>
      </select>
      <br />
      <label>Group Name:</label>
      <input type="text" id="group-name" placeholder="Enter group name" />
      <button onclick="createGroup()">Create Group</button>
      <br />
      <label>Add User UUID:</label>
      <input type="text" id="add-uuid" placeholder="Enter UUID" />
      <button onclick="addUser()">Add User</button>
    </div>

    <div id="chat-section" style="display: none">
      <p>Current Chat: <span id="current-chat"></span></p>
      <textarea id="chat-box" rows="15" cols="60" readonly></textarea><br />
      <input type="text" id="message-input" placeholder="Type a message" />
      <button onclick="sendChatMessage()">Send</button>
      <button onclick="disconnectFromServer()">Disconnect</button>
    </div>

    <script src="/static/script.js"></script>
  </body>
</html>
