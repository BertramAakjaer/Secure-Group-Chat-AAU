<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>E2EE Chat Client</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        background-color: #f4f4f9;
        display: flex;
        justify-content: center;
        padding: 20px;
      }
      #chat-container {
        width: 100%;
        max-width: 600px;
        background: white;
        padding: 20px;
        border-radius: 8px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      }
      #messages {
        height: 400px;
        overflow-y: auto;
        border: 1px solid #ddd;
        padding: 15px;
        margin-bottom: 15px;
        border-radius: 4px;
        background: #fafafa;
      }
      .msg {
        margin-bottom: 8px;
        line-height: 1.4;
      }
      .sender {
        font-weight: bold;
        color: #2c3e50;
      }
      .system {
        color: #e67e22;
        font-style: italic;
      }
      .input-group {
        display: flex;
        gap: 10px;
      }
      input[type="text"] {
        flex: 1;
        padding: 10px;
        border: 1px solid #ccc;
        border-radius: 4px;
      }
      button {
        padding: 10px 20px;
        background: #3498db;
        color: white;
        border: none;
        border-radius: 4px;
        cursor: pointer;
      }
      button:hover {
        background: #2980b9;
      }
      #status {
        font-size: 0.8em;
        color: gray;
        margin-bottom: 10px;
      }
    </style>
  </head>
  <body>
    <div id="chat-container">
      <h2>Group Chat</h2>
      <div id="status">Connecting to local client bridge...</div>
      <div id="messages"></div>
      <div class="input-group">
        <input
          type="text"
          id="msg-input"
          placeholder="Type a message or /add <userid>..."
          autocomplete="off"
        />
        <button onclick="sendMessage()">Send</button>
      </div>
    </div>

    <script>
      const messagesDiv = document.getElementById("messages");
      const statusDiv = document.getElementById("status");
      const inputField = document.getElementById("msg-input");

      // Connect directly to the client.py script running locally via Native WebSockets
      const ws = new WebSocket("ws://127.0.0.1:8765");

      ws.onopen = () => {
        statusDiv.innerHTML =
          "<span style='color: green;'>Connected to local client bridge.</span>";
      };

      ws.onclose = () => {
        statusDiv.innerHTML =
          "<span style='color: red;'>Disconnected from local client. Is client.py running?</span>";
      };

      // Receive messages from client.py (which got them from the TCP server)
      ws.onmessage = (event) => {
        const msg = JSON.parse(event.data);
        const msgElement = document.createElement("div");
        msgElement.className = "msg";

        let senderName = msg.sender || "System";

        if (msg.type === 1 || msg.type === "WELCOME") {
          msgElement.innerHTML = `<span class="system">[MLS] WELCOME received from ${senderName}. Joining group...</span>`;
        } else if (msg.type === 2 || msg.type === "COMMIT") {
          msgElement.innerHTML = `<span class="system">[MLS] Group Update (Commit) from ${senderName}.</span>`;
        } else {
          msgElement.innerHTML = `<span class="sender">[${senderName}]:</span> ${msg.content}`;
        }

        messagesDiv.appendChild(msgElement);
        messagesDiv.scrollTop = messagesDiv.scrollHeight; // Auto-scroll
      };

      function sendMessage() {
        const content = inputField.value.trim();
        if (content && ws.readyState === WebSocket.OPEN) {
          // Send standard text to client.py, which will parse it into JSON/TCP format
          ws.send(content);
          inputField.value = "";
        }
      }

      // Allow pressing Enter to send
      inputField.addEventListener("keypress", function (event) {
        if (event.key === "Enter") {
          event.preventDefault();
          sendMessage();
        }
      });
    </script>
  </body>
</html>
