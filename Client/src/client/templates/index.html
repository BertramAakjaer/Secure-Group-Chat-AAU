<!doctype html>
<html>
  <head>
    <title>Secure Group Chat Client</title>
  </head>
  <body>
    <h1>TCP Communication Client</h1>

    <div id="user-info" style="display: none">
      <p>
        User: <span id="current-user"></span> (<span id="user-uuid"></span>)
      </p>
    </div>

    <div id="login-section">
      <label>Username:</label>
      <input type="text" id="username" placeholder="Enter username" />
      <label>Server IP:</label>
      <input
        type="text"
        id="server-ip"
        placeholder="127.0.0.1"
        value="127.0.0.1"
      />
      <button onclick="connectToServer()">Connect</button>
      <p id="login-status" style="color: red"></p>
    </div>

    <div id="chat-section" style="display: none">
      <h2>Connected to {Group_name}[{Group_UUID}]</h2>

      <textarea id="chatbox" rows="20" cols="60" readonly></textarea>
      <br /><br />

      <!-- Input and Send mechanisms -->
      <input
        type="text"
        id="messageInput"
        placeholder="Type a message to send..."
        size="50"
      />
      <button onclick="sendMessage()">Send</button>
      <br /><br />
    </div>

    <script src="/static/script.js"></script>
  </body>
</html>
