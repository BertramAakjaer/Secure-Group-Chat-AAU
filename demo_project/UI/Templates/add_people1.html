<script>
const chats = JSON.parse('{{ chats | tojson | safe }}');
let currentChat = null;

// Åbn en chat
function openChat(name) {
  currentChat = name;
  document.getElementById("startpage").style.display = "none";
  document.getElementById("chatArea").classList.remove("d-none");

  const chatBox = document.querySelector(".chat-messages");
  chatBox.innerHTML = "";

  document.querySelectorAll(".list-group-item").forEach(item => {
    item.classList.remove("active");
  });

  const contactItem = Array.from(document.querySelectorAll(".list-group-item"))
    .find(a => a.textContent.includes(name));

  if (contactItem) contactItem.classList.add("active");

  if (chats[name]) {
    chats[name].forEach(msg => addMessageToChat(msg.sender, msg.text, msg.time));
  }
}

function addMessageToChat(sender, text, time) {
  const chatBox = document.querySelector(".chat-messages");
  const wrapper = document.createElement("div");
  wrapper.className = "message mb-3 " + (sender === "You" ? "align-self-end" : "align-self-start");

  wrapper.innerHTML = `
    <div class="${sender === "You" ? "bg-primary text-white" : "bg-light"} rounded p-2">
      ${sender !== "You" ? "<strong>" + sender + ":</strong> " : ""}${text}
    </div>
    <small class="text-muted">${time}</small>
  `;

  chatBox.appendChild(wrapper);
  chatBox.scrollTop = chatBox.scrollHeight;
}

// Handle sending new messages
document.getElementById("messageForm").addEventListener("submit", function(e) {
  e.preventDefault();
  const input = document.getElementById("messageText");
  const text = input.value.trim();
  if (!text || !currentChat) return;

  const time = "Just now"; // you can format real time here
  addMessageToChat("You", text, time);

  // Save to chat object
  if (!chats[currentChat]) chats[currentChat] = [];
  chats[currentChat].push({ sender: "You", text, time });

  input.value = "";
});
</script>

<script>
const messageForm = document.getElementById("messageForm");
const messageInput = document.getElementById("messageText");

messageForm.addEventListener("submit", function(e) {

    e.preventDefault();

    const msg = messageInput.value.trim();
    if (!msg || !currentChat) return;

    // brug din eksisterende funktion i stedet for at lave ny besked
    addMessageToChat("You", msg, "Just now");

    // gem i chats
    if (!chats[currentChat]) chats[currentChat] = [];
    chats[currentChat].push({ sender: "You", text: msg, time: "Just now" });

    messageInput.value = "";
});
</script>
