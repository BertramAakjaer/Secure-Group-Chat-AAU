<!-- ================================= -->
<!-- JOIN SIDE FOR GRUPPECHAT -->
<!-- ================================= -->

<!-- Brugeren kan indtaste brugernavn og chat-id for at deltage i en eksisterende chat -->
<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join Chat</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body class="join"> <div class="main-container">
        <h1>Join Groupchat</h1>


        <!-- ================================= -->
        <!-- VISER FEJLMEDDELELSE (HVIS NOGEN) -->
        <!-- ================================= -->

        {% if error %}
            <p class="error-msg">{{ error }}</p>
        {% endif %}

        <!-- ================================= -->
        <!-- FORM TIL AT JOINE CHAT -->
        <!-- ================================= -->

        <form method="POST">
            <div class="input-group">
                <label for="username">Username:</label>
                <input type="text" id="username" name="username" placeholder="Enter your name..." required>
            </div>

            <div class="input-group">
                <label for="chat_id">Chat ID:</label>
                <input type="text" id="chat_id" name="chat_id" placeholder="Enter Chat ID..." required>
            </div>
                
            <button type="submit" class="btn-primary">Join</button>
        </form>
    
        <!-- ================================= -->
        <!-- TILBAGE TIL FORSIDE -->
        <!-- ================================= -->
        <a href="/" class="btn-secondary">Back to frontpage</a>
    </div>
</body>
</html>
