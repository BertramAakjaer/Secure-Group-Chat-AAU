<!-- ================================= -->
<!-- OPRET SIDE FOR GRUPPECHAT -->
<!-- ================================= -->

<!-- Dette gør det muligt for brugere at oprette en ny chat ved at indtaste deres brugernavn -->
<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <title>Opret chat</title>
</head>
<body>
    <h1>Opret gruppechat</h1>

    <!-- ================================= -->
    <!-- VISER FEJLMEDDELELSE (HVIS NOGEN) -->
    <!-- ================================= -->
    {% if error %}
        <p style="color:red;">{{ error }}</p>
    {% endif %}

    <!-- ================================= -->
    <!-- FORM TIL AT OPRETTE CHAT -->
    <!-- ================================= -->
    <form method="POST">
        <label>Brugernavn:</label>
        <input type="text" name="username" required>
        <button type="submit">Opret</button>
    </form>

    <br>

    <!-- ================================= -->
    <!-- TILBAGE TIL FORSIDE -->
    <!-- ================================= -->
    <a href="/">Tilbage</a>
</body>
</html>
