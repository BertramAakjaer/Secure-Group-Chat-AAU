<!-- ================================= -->
<!-- OPRET SIDE FOR GRUPPECHAT -->
<!-- ================================= -->

<!-- Dette gør det muligt for brugere at oprette en ny chat ved at indtaste deres brugernavn -->
<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Chat</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body class="create"> <div class="main-container">
        <h1>Create Groupchat</h1>

        <!-- ================================= -->
        <!-- VISER FEJLMEDDELELSE (HVIS NOGEN) -->
        <!-- ================================= -->
        {% if error %}
            <p class="error-msg">{{ error }}</p>
        {% endif %}

        <!-- ================================= -->
        <!-- FORM TIL AT OPRETTE CHAT -->
        <!-- ================================= -->
        <form method="POST">
            <div class="input-group">
                <label for="username">Username:</label>
                <input type="text" id="username" name="username" placeholder="Enter your name..." required>
            </div>
            
            <button type="submit" class="btn-primary">Create</button>
        </form>

        <!--<br>-->

        <!-- ================================= -->
        <!-- TILBAGE TIL FORSIDE -->
        <!-- ================================= -->
        <a href="/" class="btn-secondary">Back to frontpage</a>
    </div>

</body>
</html>
