<!-- ================================= -->
<!-- CHATVINDUE FOR EN GRUPPECHAT -->
<!-- ================================= -->

<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">

    <!-- Titel på siden (viser chat-id) -->
    <title>Chat {{ chat_id }}</title>

    <!-- CSS stylesheet -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <!-- ================================= -->
    <!-- SIDEBAR MED GRUPPEINFORMATION -->
    <!-- ================================= -->

    <div class="sidebar">
        <h2>Groupchat</h2>
        <!-- Viser chat-id -->
        <p><strong>Group ID:</strong> {{ chat_id }}</p>
        <p>Share the group ID with others.</p>
        
        <!-- Liste over medlemmer i chatten -->
        <h3>Members</h3>
        <ul>
            {% for member in members %}
                <li>{{ member }}</li>
            {% endfor %}
        </ul>
    </div>

    <!-- ================================= -->
    <!-- CHATOMRÅDE -->
    <!-- ================================= -->
    <div class="chat-container">
        <div style="padding: 20px; border-bottom: 1px solid #faf7f7;">
            <h2>Chat for group {{ chat_id }}</h2>
        </div>
        <!-- Her vises beskeder dynamisk via JavaScript -->
        <div class="messages" id="messages"></div>

        <!-- ================================= -->
        <!-- INPUTFELT OG SEND-KNAP -->
        <!-- ================================= -->
        <div class="input-area">
            <input type="text" id="messageInput" placeholder="Type a message...">
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>

    <!-- ================================= -->
    <!-- SEND DATA FRA FLASK TIL JAVASCRIPT -->
    <!-- ================================= -->
    <script>
     const chatId = "{{ chat_id }}";
    </script>
    
    <!-- JavaScript fil til chat-funktionalitet -->
    <script src="{{ url_for('static', filename='chat.js') }}"></script>

    <script>

    function fetchMembers() {
    fetch(`/get_members/${chatId}`)
        .then(res => res.json())
        .then(data => {
            const ul = document.querySelector(".sidebar ul");
            ul.innerHTML = "";

            data.forEach(member => {
                const li = document.createElement("li");
                li.textContent = member;
                ul.appendChild(li);
            });
        });
    }

    // start med det samme
    fetchMembers();

    // opdater hver 2 sek
    setInterval(fetchMembers, 2000);
    </script>

</body>
</html>
