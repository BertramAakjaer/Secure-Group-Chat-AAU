<!-- ================================= -->
<!-- CHATVINDUE FOR EN GRUPPECHAT -->
<!-- ================================= -->

<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">

    <!-- Titel på siden (viser chat-id) -->
    <title>Chat {{ chat_id }}</title>

    <!-- CSS stylesheet -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <!-- ================================= -->
    <!-- SIDEBAR MED GRUPPEINFORMATION -->
    <!-- ================================= -->

    <div class="sidebar">
        <h2>Groupchat</h2>
        <!-- Viser chat-id -->
        <p><strong>Group ID:</strong> {{ chat_id }}</p>
        <p>Share the group ID with others.</p>
        
        <!-- Liste over medlemmer i chatten -->
        <h3>Members</h3>
        <ul>
            {% for member in members %}
                <li>{{ member }}</li>
            {% endfor %}
        </ul>
    </div>

    <!-- ================================= -->
    <!-- CHATOMRÅDE -->
    <!-- ================================= -->
    <div class="chat-container">
        <div style="padding: 20px; border-bottom: 1px solid #faf7f7;">
            <h2>Chat for group {{ chat_id }}</h2>
        </div>
        <!-- Her vises beskeder dynamisk via JavaScript -->
        <div class="messages" id="messages"></div>

        <!-- ================================= -->
        <!-- INPUTFELT OG SEND-KNAP -->
        <!-- ================================= -->
        <div class="input-area">
            <input type="text" id="messageInput" placeholder="Type a message...">
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>

    <!-- ================================= -->
    <!-- SEND DATA FRA FLASK TIL JAVASCRIPT -->
    <!-- ================================= -->
    <script>
     const chatId = "{{ chat_id }}";
     const currentUser = "{{ username }}";
    </script>
    
    <!-- JavaScript fil til chat-funktionalitet -->
    <script src="{{ url_for('static', filename='chat.js') }}"></script>

    <script>
        function fetchMembers() {
            // Spørg serveren hvem der er chatten lige nu
            fetch(`/get_members/${chatId}`)
                .then(res => res.json())
                .then(data => {
                    const ul = document.querySelector(".sidebar ul");
                    
                    // Tjek om DU er admin
                    const isAdmin = data[0] === currentUser; 
                    
                    // Tøm listen i sidebaren, før vi tegner den på ny
                    ul.innerHTML = "";

                    // Gå igennem hver bruger i listen fra serveren
                    data.forEach((member, index) => {
                        const li = document.createElement("li");
                        
                        // Gør det pænt (navn til venstre, knap til højre)
                        li.style.display = "flex";
                        li.style.justifyContent = "space-between";
                        li.style.alignItems = "center";
                        li.style.marginBottom = "8px";

                        // Lav teksten og tjek om det er admin
                        let memberName = `<span>${member}</span>`;
                        let adminBadge = "";

                        // Hvis det er nr. 1 i listen (Admin), laver vi et lille professionelt badge
                        if (index === 0) {
                            adminBadge = `<span style="
                                background-color: #e0e7ff; 
                                color: #4338ca; 
                                font-size: 10px; 
                                font-weight: bold; 
                                padding: 2px 6px; 
                                border-radius: 4px; 
                                margin-left: 8px;
                                text-transform: uppercase;
                                letter-spacing: 0.5px;
                                border: 1px solid #c7d2fe;
                            ">Admin</span>`;
                        }

                        let content = `<div>${memberName}${adminBadge}</div>`;
                        
                        // ADMIN LOGIK: Vis kun "Kick" knappen hvis:
                        // a) DU er admin
                        // b) Brugeren i listen IKKE er dig selv
                        if (isAdmin && member !== currentUser) {
                            content += `
                                <button 
                                    onclick="kickUser('${member}')" 
                                    style="background-color: #ff4d4d; color: white; border: none; border-radius: 5px; padding: 5px 10px; cursor: pointer; font-size: 12px;">
                                    Kick
                                </button>`;
                        }

                        li.innerHTML = content;
                        ul.appendChild(li);
                    });
                });
        }

        // FUNKTIONEN DER SENDER KICK-ANMODNING TIL SERVEREN
        function kickUser(usernameToKick) {
            if (confirm(`Er du sikker på, at du vil smide ${usernameToKick} ud?`)) {
                fetch(`/kick_user/${chatId}/${usernameToKick}`, { method: 'POST' })
                    .then(res => res.json())
                    .then(data => {
                        if (data.success) {
                            fetchMembers(); // Opdater listen med det samme
                        } else {
                            alert("Fejl: " + data.error);
                        }
                    })
                    .catch(err => console.error("Netværksfejl:", err));
            }
        }

        // Start med det samme når siden åbner
        fetchMembers();

        // Opdater listen hvert 2. sekund
        setInterval(fetchMembers, 2000);
    </script>

</body>
</html>
