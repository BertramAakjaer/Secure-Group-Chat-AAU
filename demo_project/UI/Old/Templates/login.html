
<!doctype html>
<html lang="da">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Welcome!</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}"> <!-- Link to the CSS file in the folder -->
</head>


<body>
  <div class="app">
    <div class="topbar">
      <div class="title">Welcome!</div>
      <div class="spacer"></div>
    </div>

    <center>
    <form id="loginForm" style="margin-top: 250px; width: 300px;">  
      <div class="form-group">
        <label for="examplegroupID">Group-ID</label>
        <input type="number" class="form-control" id="examplegroupID" aria-describedby="groupID" placeholder="Enter Group-ID">
      </div>
      <div style="margin-top: 10px;">  
      <div class="form-group">
        <label for="exampleusername">Username</label>
        <input type="text" class="form-control" id="exampleusername" placeholder="Enter Username">
      </div>
        <div style="margin-top: 10px;">  
      <div class="form-group">
        <label for="exampleusername">E-mail</label>
        <input type="text" class="form-control" id="exampleemail" placeholder="Enter E-mail">
      </div>
     <div style="margin-top: 10px;">  
        <button type="submit" class="btn btn-primary">Submit</button>
    </div>
    </form>
    </center>

    <form method="POST" action="/templates/chat.html">
    <input type="number" name="groupID" id="examplegroupID" placeholder="Enter Group-ID">
    <input type="text" name="username" id="exampleusername" placeholder="Enter Username">
    <input type="text" name="email" id="exampleemail" placeholder="Enter E-mail">
    <button type="submit">Submit</button>
  </form>

</body>
</html>
