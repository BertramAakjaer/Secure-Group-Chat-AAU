<!doctype html>
<html lang="da">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Welcome!</title>

  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}"> <!-- tilgår style.css -->

</head>


<body>
  <div class="app">
    <div class="topbar">
      <div class="title">Welcome!</div>
      <div class="spacer"></div>
    </div>

    <center>
    <form id="loginForm" style="margin-top: 250px; width: 300px;">  
      <div class="form-group">
        <label for="examplegroupID">Group-ID</label>
        <input type="number" class="form-control" id="examplegroupID" aria-describedby="groupID" placeholder="Enter Group-ID">
      </div>
      <div style="margin-top: 10px;">  
      <div class="form-group">
        <label for="exampleusername">Username</label>
        <input type="text" class="form-control" id="exampleusername" placeholder="Enter Username">
      </div>
        <div style="margin-top: 10px;">  
      <div class="form-group">
        <label for="exampleusername">E-mail</label>
        <input type="text" class="form-control" id="exampleemail" placeholder="Enter E-mail">
      </div>
     <div style="margin-top: 10px;">  
        <button type="submit" class="btn btn-primary">Submit</button>
    </div>
    </form>
    </center>

    <script>
        const form = document.getElementById("loginForm");

    form.addEventListener("submit", (e) => {
      e.preventDefault();

     const groupID = document.getElementById("examplegroupID").value;
     const username = document.getElementById("exampleusername").value;
     const email = document.getElementById("exampleemail").value;

     if (!groupID || !username || !email) return;

      window.location.href = `chat.html?username=${encodeURIComponent(username)}`;
    });

  </script>

</body>
</html>
