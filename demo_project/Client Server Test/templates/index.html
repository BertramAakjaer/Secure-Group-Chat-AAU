<!doctype html>
<html>
  <head>
    <title>Simple TCP Chat Client</title>
  </head>
  <body>
    <h2>Simple Python TCP Chat</h2>

    <div id="login-section">
      <label>Username:</label>
      <input type="text" id="username" placeholder="Enter username" />
      <label>Server IP:</label>
      <input
        type="text"
        id="server-ip"
        placeholder="127.0.0.1"
        value="127.0.0.1"
      />
      <button onclick="connectToServer()">Connect</button>
      <p id="login-status"></p>
    </div>

    <div id="chat-section" style="display: none">
      <p>Connected as: <span id="current-user"></span></p>
      <textarea id="chat-box" rows="15" cols="60" readonly></textarea><br />
      <input type="text" id="message-input" placeholder="Type a message" />
      <button onclick="sendChatMessage()">Send</button>
      <button onclick="disconnectFromServer()">Disconnect</button>
    </div>

    <script>
      let pollInterval = null;

      function setStatus(msg) {
        document.getElementById("login-status").textContent = msg;
      }

      function connectToServer() {
        const username = document.getElementById("username").value.trim();
        const ip =
          document.getElementById("server-ip").value.trim() || "127.0.0.1";

        if (!username) {
          setStatus("Must enter username.");
          return;
        }

        fetch("/connect", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ ip, username }),
        })
          .then((res) => res.json())
          .then((data) => {
            if (data.status === "success") {
              document.getElementById("login-section").style.display = "none";
              document.getElementById("chat-section").style.display = "block";
              document.getElementById("current-user").textContent = username;
              setStatus("");
              if (pollInterval) clearInterval(pollInterval);
              pollInterval = setInterval(fetchMessages, 1000);
              fetchMessages();
            } else {
              setStatus("Connect error: " + (data.message || "unknown"));
            }
          })
          .catch((err) => setStatus("Connect failed: " + err));
      }

      function sendChatMessage() {
        const msgInput = document.getElementById("message-input");
        const text = msgInput.value.trim();
        if (!text) return;

        fetch("/send", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message: text }),
        })
          .then((res) => res.json())
          .then((data) => {
            if (data.status === "success") {
              msgInput.value = "";
              fetchMessages();
            } else {
              alert("Send failed: " + (data.message || "unknown"));
            }
          });
      }

      function disconnectFromServer() {
        fetch("/disconnect", { method: "POST" }).then(() => {
          if (pollInterval) clearInterval(pollInterval);
          pollInterval = null;
          document.getElementById("login-section").style.display = "block";
          document.getElementById("chat-section").style.display = "none";
          document.getElementById("chat-box").value = "";
          document.getElementById("username").value = "";
          document.getElementById("current-user").textContent = "";
        });
      }

      function fetchMessages() {
        fetch("/messages")
          .then((res) => res.json())
          .then((data) => {
            const chatBox = document.getElementById("chat-box");
            chatBox.value = data.messages.join("\n");
            chatBox.scrollTop = chatBox.scrollHeight;
          });
      }
    </script>
  </body>
</html>
