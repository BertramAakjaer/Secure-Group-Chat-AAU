<!doctype html>
<html lang="da">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Welcome!</title>

  <style>
    :root{
      --bg: #f3f3f3;
      --panel: #ffffff;
      --bar: #0f0f0f;
      --barText: #ffffff;
      --bubble: #ffffff;
      --bubbleMe: #ffffff;
      --text: #111;
      --muted: #6f6f6f;
      --border: #e7e7e7;
      --shadow: 0 10px 30px rgba(0,0,0,.08);
    }

    *{ box-sizing: border-box; }
    body{
      margin:0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .app{
      width: min(980px, 96vw);
      height: min(720px, 92vh);
      margin: 3vh auto;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      box-shadow: var(--shadow);
      display: grid;
      grid-template-rows: 56px 1fr 72px;
    }

    /* Topbar */
    .topbar{
      background: rgb(255, 0, 238);
      color: var(--barText);
      display: flex;
      align-items: center;
      padding: 0 16px;
      gap: 12px;
    }
    .title{
      font-size: 18px;
      font-weight: 600;
      letter-spacing: .2px;
    }

    #loginForm input {
    width: 100%;
}

  </style>
</head>


<body>
  <div class="app">
    <div class="topbar">
      <div class="title">Welcome!</div>
      <div class="spacer"></div>
    </div>

    <center>
    <form id="loginForm" style="margin-top: 250px; width: 300px;">  
      <div class="form-group">
        <label for="examplegroupID">Group-ID</label>
        <input type="number" class="form-control" id="examplegroupID" aria-describedby="groupID" placeholder="Enter Group-ID">
      </div>
      <div style="margin-top: 10px;">  
      <div class="form-group">
        <label for="exampleusername">Username</label>
        <input type="text" class="form-control" id="exampleusername" placeholder="Enter Username">
      </div>
        <div style="margin-top: 10px;">  
      <div class="form-group">
        <label for="exampleusername">E-mail</label>
        <input type="text" class="form-control" id="exampleemail" placeholder="Enter E-mail">
      </div>
     <div style="margin-top: 10px;">  
        <button type="submit" class="btn btn-primary">Submit</button>
    </div>
    </form>
    </center>

    <script>
        const form = document.getElementById("loginForm");

    form.addEventListener("submit", (e) => {
      e.preventDefault();

     const groupID = document.getElementById("examplegroupID").value;
     const username = document.getElementById("exampleusername").value;
     const email = document.getElementById("exampleemail").value;

     if (!groupID || !username || !email) return;

      window.location.href = `HTML.html?username=${encodeURIComponent(username)}`;
    });

  </script>

</body>
</html>
